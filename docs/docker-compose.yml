

networks:
  bigdata-net:
    driver: bridge

services:

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    networks:
      - bigdata-net
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - /root/bigdata/hadoop/namenode:/hadoop/dfs/name
      - /root/bigdata/data:/data
    environment:
      - CLUSTER_NAME=taobao-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_permissions_enabled=false

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    networks:
      - bigdata-net
    volumes:
      - /root/bigdata/hadoop/datanode:/hadoop/dfs/data
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_permissions_enabled=false
    depends_on:
      - namenode

  hive-metastore-db:
    image: postgres:13
    container_name: hive-metastore-db
    restart: always
    networks:
      - bigdata-net
    environment:
      - POSTGRES_DB=metastore
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive123
    volumes:
      - /root/bigdata/hive/postgres:/var/lib/postgresql/data

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    restart: always
    networks:
      - bigdata-net
    environment:
      - HIVE_METASTORE_DB_TYPE=postgres
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionURL=jdbc:postgresql://hive-metastore-db/metastore
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName=org.postgresql.Driver
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName=hive
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword=hive123
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    command: /opt/hive/bin/hive --service metastore
    depends_on:
      - hive-metastore-db
      - namenode

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    restart: always
    networks:
      - bigdata-net
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      - HIVE_METASTORE_URI=thrift://hive-metastore:9083
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionURL=jdbc:postgresql://hive-metastore-db/metastore
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName=org.postgresql.Driver
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName=hive
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword=hive123
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      - hive-metastore